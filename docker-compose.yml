services:
  fake-gcs:
    image: fsouza/fake-gcs-server
    ports:
      - "4443:4443"
    command: ["-scheme", "http", "-port", "4443", "-backend", "filesystem", "-data", "/storage"]
    volumes:
      - fake-gcs-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 2s
      timeout: 2s
      retries: 5

  gcs-init:
    image: node:20.20.0-slim
    depends_on:
      fake-gcs:
        condition: service_healthy
    restart: "no"
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
    environment:
      - STORAGE_EMULATOR_HOST=http://fake-gcs:4443
      - GCS_BUCKET_NAME=artofliving-ttcdesk.appspot.com
    command: ["node", "scripts/gcs-seed.mjs"]

  ttp-nextjs:
    build: .
    ports:
      - "8009:8009"
    depends_on:
      gcs-init:
        condition: service_completed_successfully
    environment:
      - NODE_ENV=development
      - PORT=8009
      - WATCHPACK_POLLING=true
      - STORAGE_EMULATOR_HOST=http://fake-gcs:4443
      - GCS_BUCKET_NAME=artofliving-ttcdesk.appspot.com
      - SESSION_HMAC_SECRET=dev-test-secret-not-for-production
      # Stable local test auth: if no env override is provided, use a known dev password.
      - DEV_LOGIN_PASSWORD=${DEV_LOGIN_PASSWORD:-DevPass123}
      # Keep map override optional; empty by default to avoid compose warnings.
      - DEV_LOGIN_CREDENTIALS=${DEV_LOGIN_CREDENTIALS:-}

volumes:
  fake-gcs-data:
