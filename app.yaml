# application: artofliving-ttcdesk-dev
# version: 3
runtime: python27
instance_class: F2
api_version: 1
threadsafe: true
# service: ttc-portal-service

handlers:
- url: /blank.html
  static_files: blank.html
  upload: blank.html
  secure: always

- url: /
  script: ttc_portal.app
  login: required
  secure: always

- url: /images
  static_dir: images
  secure: always

- url: /tabs/.*
  script: tabs.app
  login: required
  secure: always

- url: /admin/.*
  script: admin.app
  login: required
  secure: always

- url: /form/.*
  script: form.app
  login: required
  secure: always

- url: /users/.*
  script: ttc_portal_user.app
  login: required
  secure: always

- url: /upload/.*
  script: pyutils.upload.app
  login: required
  secure: always

- url: /storage
  static_dir: storage
  login: required
  secure: always

- url: /javascript
  static_dir: javascript
  login: required
  secure: always

- url: /styles
  static_dir: styles
  secure: always

- url: /ext
  static_dir: ext

- url: /disabled
  script: disabled.app
  login: required
  secure: always

- url: /createpdf
  script: pyutils.createpdf.app
  login: required
  secure: always

- url: /reporting/user-summary/.*
  script: reporting.user_summary.app
  login: required
  secure: always

- url: /reporting/user-report/.*
  script: reporting.user_report.app
  login: required
  secure: always

- url: /jobs/reporting/user-summary/.*
  script: reporting.user_summary.app
  login: admin
  secure: always

- url: /integrity/user-integrity/.*
  script: reporting.user_integrity.app
  login: required
  secure: always

- url: /jobs/integrity/user-integrity/.*
  script: reporting.user_integrity.app
  login: admin
  secure: always

- url: /reporting/participant-list/.*
  script: reporting.participant_list.app
  login: required
  secure: always


  #- url: /.*
#  script: not_found.app

# [START libraries]
libraries:
- name: webapp2
  version: latest
- name: jinja2
  version: latest
- name: numpy
  version: latest
# [END libraries]

# SECURITY NOTE: API keys removed from source control. Set these in your deployment environment.
env_variables:
  GOOGLE_MAPS_API_KEY: ''
  GOOGLE_PUBLIC_API_KEY: ''
  # SERVICE_JSON_FILE: Path to service account JSON (if needed)
  # Use Application Default Credentials in production instead
